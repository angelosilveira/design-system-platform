name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Gerar métricas do Health Dashboard
        run: pnpm --filter storybook metrics

      - name: Typecheck / build (todos os pacotes, incluindo Storybook)
        run: pnpm build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Testes unitários
        run: pnpm --filter @design-system/ui test

      - name: Upload Storybook build (artefato)
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          retention-days: 7
  performance-tests:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Storybook build
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static

      - name: Rodar Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun --config=./lighthouserc.json
        continue-on-error: true
